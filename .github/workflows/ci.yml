name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: runtime.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile application
        run: python -m py_compile main.py

      - name: Verify Flask app import
        run: python -c "import main; assert hasattr(main, 'app')"

      - name: Verify health endpoint
        run: python -c "import main; client = main.app.test_client(); response = client.get('/'); assert response.status_code == 200; assert response.data.decode() == 'scanner running'"
